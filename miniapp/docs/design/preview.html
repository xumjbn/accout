<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>语随记 · 小程序设计稿 v2</title>
<style>
:root{
  --brand:#4E6EF5; --brand2:#7A5AF8; --bg:#F4F5FB; --bg-top:#E9EDFF;
  --text:#1B1F2C; --muted:#6B7280; --tert:#9CA3AF; --sep:#ECEEF5;
  --green:#10B981; --red:#EF4444; --orange:#F59E0B; --gold:#FFC94D;
  --page:#E9EBF2; --pagetext:#1B1F2C;
}
*{box-sizing:border-box}
body{margin:0;padding:40px 24px 64px;background:var(--page);color:var(--pagetext);
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased}
.intro{max-width:860px;margin:0 auto 28px;text-align:center}
.intro h1{font-size:26px;margin:0 0 8px;letter-spacing:-.02em}
.intro p{margin:0;color:#697083;font-size:14px;line-height:1.7}
.tag{display:inline-block;margin-bottom:12px;font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--brand)}

/* 设计令牌条 */
.tokens{max-width:980px;margin:0 auto 40px;background:#fff;border-radius:16px;padding:20px 24px;
  display:flex;flex-wrap:wrap;gap:24px;align-items:center;box-shadow:0 6px 20px rgba(38,48,92,.06)}
.tk-group{display:flex;align-items:center;gap:10px}
.tk-label{font-size:11px;color:#8A91A0;letter-spacing:.08em}
.chip{width:34px;height:34px;border-radius:10px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.05)}
.tk-type b{font-size:22px}.tk-type span{font-size:12px;color:#8A91A0}

.phones{display:flex;gap:32px;justify-content:center;align-items:flex-start;flex-wrap:wrap}
figure{margin:0;display:flex;flex-direction:column;align-items:center;gap:12px}
figcaption{font-size:13px;color:#697083}
figcaption b{color:var(--pagetext)}
.frame{width:320px;background:#1A1A1C;border-radius:48px;padding:10px;
  box-shadow:0 24px 60px rgba(15,20,40,.28)}
.screen{position:relative;background:linear-gradient(180deg,var(--bg-top) 0%,var(--bg) 200px);
  border-radius:40px;overflow:hidden;height:640px;display:flex;flex-direction:column;font-size:14px;color:var(--text)}
.status{flex:none;height:36px;display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px 0;font-size:12.5px;font-weight:600}
/* 小程序导航栏 + 胶囊 */
.navbar{flex:none;height:44px;display:flex;align-items:center;justify-content:center;position:relative;font-weight:600;font-size:16px}
.capsule{position:absolute;right:12px;top:7px;width:80px;height:30px;border-radius:15px;
  background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-evenly;
  font-size:14px;color:#333}
.capsule i{font-style:normal}
.body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0 14px;gap:11px}

/* 搜索行 */
.srow{display:flex;gap:10px;align-items:center;padding-top:4px}
.search{flex:1;height:34px;border-radius:17px;background:rgba(255,255,255,.85);display:flex;align-items:center;
  padding:0 14px;color:#9AA1B2;font-size:13px;box-shadow:0 2px 8px rgba(38,48,92,.05)}
.rbtn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);display:grid;place-items:center;
  color:var(--brand);font-size:17px;box-shadow:0 2px 8px rgba(38,48,92,.05)}

/* 概览卡 */
.summary{position:relative;overflow:hidden;border-radius:18px;padding:18px 20px;color:#fff;
  background:radial-gradient(circle at 85% 15%,rgba(255,255,255,.22),rgba(255,255,255,0) 42%),
    radial-gradient(circle at 10% 90%,rgba(255,214,130,.18),rgba(255,214,130,0) 45%),
    linear-gradient(135deg,#4E6EF5 0%,#6C5CE7 55%,#7A5AF8 100%);
  box-shadow:0 10px 28px rgba(78,110,245,.35)}
.summary .cap{font-size:12px;opacity:.85}
.summary .big{display:block;font-size:32px;font-weight:800;font-variant-numeric:tabular-nums;margin:4px 0 8px;letter-spacing:-.02em}
.summary .row{display:flex;justify-content:space-between;font-size:11.5px;opacity:.9}
.summary .budget{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.22)}
.summary .brow{display:flex;justify-content:space-between;font-size:11px;opacity:.92;margin-bottom:5px}
.track{height:5px;border-radius:3px;background:rgba(255,255,255,.25);overflow:hidden}
.track i{display:block;height:100%;width:64%;background:#fff;border-radius:3px}

/* 列表 */
.dayt{font-size:11.5px;color:var(--tert);padding:2px 6px 0}
.txcard{background:#fff;border-radius:14px;padding:4px 14px;box-shadow:0 3px 10px rgba(38,48,92,.04)}
.tx{display:flex;align-items:center;gap:10px;padding:9px 0}
.tx + .tx{border-top:1px solid var(--sep)}
.ticon{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:15px;flex:none}
.tinfo{flex:1;min-width:0}
.tname{font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tsub{font-size:10.5px;color:var(--tert)}
.tamt{font-weight:650;font-variant-numeric:tabular-nums;font-size:13.5px}
.tamt.in{color:var(--green)}

/* 按住说话 */
.holdbtn{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#4E6EF5,#7A5AF8);color:#fff;padding:12px 30px;border-radius:30px;
  font-size:14px;font-weight:600;box-shadow:0 10px 24px rgba(94,100,245,.45);z-index:5}

/* tabBar */
.tabbar{flex:none;height:56px;border-top:1px solid var(--sep);background:rgba(255,255,255,.92);
  display:flex;padding-bottom:10px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:9.5px;color:var(--tert)}
.tab.on{color:var(--brand)}
.tab .ic{font-size:18px;line-height:1}

/* 录音浮层 */
.recmask{position:absolute;inset:0;background:rgba(15,18,34,.55);z-index:9;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:0 34px 120px}
.pulse{position:relative;width:96px;height:96px;display:grid;place-items:center;margin-bottom:22px}
.pulse::before{content:"";position:absolute;inset:-14px;border-radius:50%;background:rgba(122,90,248,.4)}
.pulse::after{content:"";position:absolute;inset:-30px;border-radius:50%;background:rgba(122,90,248,.18)}
.micbig{position:relative;z-index:1;width:96px;height:96px;border-radius:50%;display:grid;place-items:center;font-size:38px;
  background:linear-gradient(135deg,#4E6EF5,#7A5AF8);box-shadow:0 12px 32px rgba(78,110,245,.5)}
.rectext{color:#fff;font-size:21px;font-weight:650;text-align:center;line-height:1.5}
.rechint{margin-top:14px;color:rgba(255,255,255,.55);font-size:12px;text-align:center}
.holdbtn.hold{background:linear-gradient(135deg,#EF4444,#F97316);box-shadow:0 10px 24px rgba(239,68,68,.45);z-index:10}

/* 确认弹层 */
.sheetmask{position:absolute;inset:0;background:rgba(15,18,34,.45);z-index:9;display:flex;flex-direction:column;justify-content:flex-end}
.sheet{background:#fff;border-radius:24px 24px 0 0;padding:10px 22px 22px;display:flex;flex-direction:column}
.grab{width:36px;height:4px;border-radius:2px;background:#E3E6EF;align-self:center;margin-bottom:12px}
.said{font-size:12.5px;color:var(--muted);margin-bottom:12px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.toggle{display:flex;background:#F0F2F9;border-radius:20px;padding:3px;margin-bottom:6px}
.topt{flex:1;text-align:center;padding:7px 0;font-size:13px;color:var(--muted);border-radius:17px}
.topt.on{background:#fff;color:var(--brand);font-weight:650;box-shadow:0 1px 4px rgba(38,48,92,.1)}
.frow{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--sep);font-size:13.5px}
.flabel{width:64px;color:var(--muted)}
.fval{flex:1;text-align:right}
.fval.money{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.acts{display:flex;gap:10px;margin-top:16px}
.acancel{flex:1;text-align:center;padding:12px 0;border-radius:24px;background:#F0F2F9;color:var(--muted);font-size:14px}
.asave{flex:2;text-align:center;padding:12px 0;border-radius:24px;color:#fff;font-size:14px;font-weight:650;
  background:linear-gradient(135deg,#4E6EF5,#7A5AF8);box-shadow:0 8px 18px rgba(94,100,245,.35)}

/* 统计/资产复用 */
.tiles{display:flex;gap:8px}
.tile{flex:1;background:#fff;border-radius:12px;padding:9px 11px;box-shadow:0 3px 10px rgba(38,48,92,.04)}
.tile .k{font-size:10px;color:var(--tert)}
.tile .v{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap}
.tile .v.g{color:var(--green)}.tile .v.b{color:var(--brand)}
.ccard{background:#fff;border-radius:14px;padding:13px 15px;box-shadow:0 3px 10px rgba(38,48,92,.04)}
.ccard h4{margin:0 0 10px;font-size:13.5px}
.donutwrap{display:flex;align-items:center;gap:14px}
.donut{position:relative;width:108px;height:108px;flex:none}
.donut .ring{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(#78716C 0 287deg,#F97316 287deg 325deg,#06B6D4 325deg 337deg,#EC4899 337deg 348deg,#8B5CF6 348deg 356deg,#4E6EF5 356deg 360deg);
  -webkit-mask:radial-gradient(circle,transparent 56%,#000 58%);mask:radial-gradient(circle,transparent 56%,#000 58%)}
.donut .lab{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .lab .k{font-size:9px;color:var(--tert)}
.donut .lab .v{font-size:13.5px;font-weight:750;font-variant-numeric:tabular-nums}
.legend{display:flex;flex-direction:column;gap:5px;font-size:10.5px;color:var(--muted)}
.legend .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px}
.bars{display:flex;align-items:flex-end;gap:4px;height:64px}
.bars i{flex:1;border-radius:2px;background:linear-gradient(180deg,#4E6EF5,#7A5AF8);min-height:2px}
.month{display:flex;justify-content:space-between;align-items:center;padding:0 6px;font-weight:650;font-size:13.5px}
.month .chev{color:var(--brand)}

.networth{position:relative;overflow:hidden;border-radius:18px;padding:18px 20px;color:#fff;
  background:radial-gradient(circle at 85% 12%,rgba(255,214,130,.25),rgba(255,214,130,0) 45%),
    linear-gradient(135deg,#0EA5A4 0%,#10B981 100%);box-shadow:0 10px 28px rgba(16,185,129,.32)}
.acrow{display:flex;align-items:center;gap:10px;padding:9px 0}
.acrow + .acrow{border-top:1px solid var(--sep)}
.acprofit{font-size:10px;color:var(--green)}
</style>
</head>
