name: Accout
options:
  bundleIdPrefix: com.xumjbn
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: zh-Hans
settings:
  base:
    SWIFT_VERSION: "5.9"
targets:
  Accout:
    type: application
    platform: iOS
    sources:
      - Accout
    dependencies:
      - target: AccoutWidget
        embed: true
    entitlements:
      path: Accout/Accout.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.xumjbn.accout
    info:
      path: Accout/Info.plist
      properties:
        CFBundleDisplayName: 语记账
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSMicrophoneUsageDescription: 语记账需要使用麦克风录制您的语音，用于语音记账。
        NSSpeechRecognitionUsageDescription: 语记账需要使用语音识别，把您说的话自动转换成账单记录。
        CFBundleURLTypes:
          - CFBundleURLName: com.xumjbn.accout
            CFBundleURLSchemes:
              - accout
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xumjbn.accout
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      gatherCoverageData: false
  AccoutWidget:
    type: app-extension
    platform: iOS
    sources:
      - AccoutWidget
      - Accout/Models
      - Accout/Support/Extensions.swift
    entitlements:
      path: AccoutWidget/AccoutWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.xumjbn.accout
    info:
      path: AccoutWidget/Info.plist
      properties:
        CFBundleDisplayName: 语记账
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.xumjbn.accout.widget
        TARGETED_DEVICE_FAMILY: "1"
